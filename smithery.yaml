name: "@foundrynet/social-intel-mcp"
displayName: "FoundryNet Social Intelligence"
description: >-
  Trending topics across Reddit, Hacker News, and Google Trends with velocity scoring, sentiment analysis, and viral content detection.
icon: "📱"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/social-intel-mcp"
license: "MIT"
categories:
  - data
  - social-media
  - research
tags:
  - trending-topics
  - social-media-trends
  - reddit
  - hackernews
  - sentiment-analysis
  - viral-content
keywords:
  - trending-topics
  - social-media-trends
  - reddit
  - hackernews
  - sentiment-analysis
  - viral-content
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://social-intel-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
